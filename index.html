    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}.app{width:min(100%,760px);margin:0 auto;padding:18px 14px 40px}header{background:linear-gradient(135deg,#fff 0%,#eef5ff 100%);border:1px solid var(--line);border-radius:24px;padding:22px 18px;box-shadow:var(--shadow);margin-bottom:16px}h1{margin:0 0 8px;font-size:clamp(1.8rem,7vw,2.6rem);letter-spacing:-.04em}.subtitle{margin:0;color:var(--muted);font-size:.98rem}.toolbar{position:sticky;top:0;z-index:10;background:rgba(246,248,251,.95);backdrop-filter:blur(12px);padding:10px 0 12px}.language-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}button,.maps-link{border:0;font:inherit;cursor:pointer;border-radius:999px;min-height:44px;font-weight:700}.language-toggle button{background:var(--card);color:var(--text);border:1px solid var(--line)}.language-toggle button.active{background:var(--primary);color:white;border-color:var(--primary)}.search{width:100%;min-height:48px;border:1px solid var(--line);border-radius:999px;padding:0 16px;font-size:1rem;outline:none;background:white;box-shadow:0 4px 14px rgba(16,24,40,.04)}.search:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(37,99,235,.12)}.categories{display:flex;gap:8px;overflow-x:auto;padding:10px 0 4px;scrollbar-width:none}.categories::-webkit-scrollbar{display:none}.category-btn{white-space:nowrap;background:var(--chip);color:#344054;border:1px solid #dbe4ff;padding:0 14px;flex:0 0 auto}.category-btn.active{background:var(--chip-active);color:var(--primary-dark);border-color:#93c5fd}.meta{margin:4px 2px 12px;color:var(--muted);font-size:.92rem}.list{display:grid;gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}

      { id:3, category:"Neighborhood", title:{en:"Plaka",vi:"Khu Plaka"}, description:{en:"Plaka is one of the oldest and most charming neighborhoods in Athens. Its narrow streets, small shops, cafÃ©s and neoclassical houses make it a pleasant area to explore on foot.",vi:"Plaka lÃ  má»™t trong nhá»¯ng khu phá»‘ cá»• vÃ  quyáº¿n rÅ© nháº¥t á»Ÿ Athens. Nhá»¯ng con Ä‘Æ°á»ng nhá», cá»­a hÃ ng, quÃ¡n cÃ  phÃª vÃ  cÃ¡c ngÃ´i nhÃ  tÃ¢n cá»• Ä‘iá»ƒn khiáº¿n nÆ¡i Ä‘Ã¢y ráº¥t phÃ¹ há»£p Ä‘á»ƒ Ä‘i bá»™ khÃ¡m phÃ¡."}, images:["https://images.unsplash.com/photo-1601581875309-fafbf2d3ed3a?auto=format&fit=crop&w=1200&q=80","https://upload.wikimedia.org/wikipedia/commons/8/86/Plaka_Athens_Greece.jpg","https://images.unsplash.com/photo-1555993539-1732b0258235?auto=format&fit=crop&w=1200&q=80"], maps_url:"https://www.google.com/maps/search/?api=1&query=Plaka%20Athens" },

      { id:5, category:"Museum", title:{en:"National Archaeological Museum",vi:"Báº£o tÃ ng Kháº£o cá»• Quá»‘c gia"}, description:{en:"The National Archaeological Museum is one of the most important museums in Greece. It contains an extensive collection of ancient Greek art, sculpture, jewelry and historical objects.",vi:"Báº£o tÃ ng Kháº£o cá»• Quá»‘c gia lÃ  má»™t trong nhá»¯ng báº£o tÃ ng quan trá»ng nháº¥t á»Ÿ Hy Láº¡p. NÆ¡i Ä‘Ã¢y cÃ³ bá»™ sÆ°u táº­p lá»›n vá» nghá»‡ thuáº­t Hy Láº¡p cá»• Ä‘áº¡i, tÆ°á»£ng Ä‘iÃªu kháº¯c, trang sá»©c vÃ  cÃ¡c hiá»‡n váº­t lá»‹ch sá»­."}, images:["https://upload.wikimedia.org/wikipedia/commons/0/0f/National_Archaeological_Museum_Athens.jpg","https://images.unsplash.com/photo-1587474260584-136574528ed5?auto=format&fit=crop&w=1200&q=80","https://images.unsplash.com/photo-1601581875309-fafbf2d3ed3a?auto=format&fit=crop&w=1200&q=80"], maps_url:"https://www.google.com/maps/search/?api=1&query=National%20Archaeological%20Museum%20Athens" }
    ];
    const categories=["All","Historical","Museum","Neighborhood","Viewpoint","Food & Drink","Shopping"];
    const translations={en:{subtitle:"A compact guide to highlights in Athens.",searchPlaceholder:"Search attractions...",all:"All",imageUnavailable:"Image unavailable",openMaps:"Open in Google Maps",results:c=>`${c} ${c===1?"attraction":"attractions"} found`,noResults:"No attractions found. Try another search or category.",footer:"Images are loaded from public image URLs.",previousImage:"Previous image",nextImage:"Next image"},vi:{subtitle:"Cáº©m nang ngáº¯n gá»n vá» cÃ¡c Ä‘iá»ƒm ná»•i báº­t á»Ÿ Athens.",searchPlaceholder:"TÃ¬m Ä‘á»‹a Ä‘iá»ƒm...",all:"Táº¥t cáº£",imageUnavailable:"KhÃ´ng cÃ³ hÃ¬nh áº£nh",openMaps:"Má»Ÿ trong Google Maps",results:c=>`TÃ¬m tháº¥y ${c} Ä‘á»‹a Ä‘iá»ƒm`,noResults:"KhÃ´ng tÃ¬m tháº¥y Ä‘á»‹a Ä‘iá»ƒm nÃ o. HÃ£y thá»­ tá»« khÃ³a hoáº·c danh má»¥c khÃ¡c.",footer:"HÃ¬nh áº£nh Ä‘Æ°á»£c táº£i tá»« cÃ¡c liÃªn káº¿t cÃ´ng khai.",previousImage:"áº¢nh trÆ°á»›c",nextImage:"áº¢nh tiáº¿p theo"}};
    const state={language:localStorage.getItem("athensGuideLanguage")||"en",category:"All",search:"",slideIndex:{}};
    const listEl=document.getElementById("attractions-list"),categoriesEl=document.getElementById("categories"),searchEl=document.getElementById("search"),resultCountEl=document.getElementById("result-count"),langButtons=document.querySelectorAll("[data-lang]");
    function t(k,v){const e=translations[state.language][k];return typeof e==="function"?e(v):e} function setLanguage(l){state.language=l;localStorage.setItem("athensGuideLanguage",l);document.documentElement.lang=l;render()} function setCategory(c){state.category=c;render()} function normalize(v){return String(v||"").toLowerCase().trim()}
    function getFilteredAttractions(){const q=normalize(state.search);return attractions.filter(i=>{const mc=state.category==="All"||i.category===state.category;const text=[i.category,i.title.en,i.title.vi,i.description.en,i.description.vi].join(" ");return mc&&(!q||normalize(text).includes(q))})}
    function renderCategories(){categoriesEl.innerHTML="";categories.forEach(c=>{const b=document.createElement("button");b.type="button";b.className=`category-btn ${state.category===c?"active":""}`;b.textContent=c==="All"?t("all"):c;b.addEventListener("click",()=>setCategory(c));categoriesEl.appendChild(b)})}
    function updateSlider(slider,item){const imgs=item.images||[],idx=state.slideIndex[item.id]||0,track=slider.querySelector(".slider-track"),dots=slider.querySelectorAll(".dot"),prev=slider.querySelector(".prev"),next=slider.querySelector(".next");if(track)track.style.transform=`translateX(-${idx*100}%)`;dots.forEach((d,i)=>d.classList.toggle("active",i===idx));if(prev)prev.disabled=imgs.length<=1;if(next)next.disabled=imgs.length<=1}
    function createSlider(item){const imgs=item.images||[],slider=document.createElement("div");slider.className="slider";if(!imgs.length){const empty=document.createElement("div");empty.className="slide";empty.textContent=t("imageUnavailable");slider.appendChild(empty);return slider}if(state.slideIndex[item.id]===undefined)state.slideIndex[item.id]=0;const track=document.createElement("div");track.className="slider-track";imgs.forEach((src,index)=>{const slide=document.createElement("div");slide.className="slide";const img=document.createElement("img");img.src=src;img.alt=`${item.title[state.language]||item.title.en} ${index+1}`;img.loading="lazy";img.referrerPolicy="no-referrer";img.addEventListener("error",()=>{slide.innerHTML="";slide.textContent=t("imageUnavailable")});slide.appendChild(img);track.appendChild(slide)});const prev=document.createElement("button");prev.type="button";prev.className="slider-btn prev";prev.textContent="â€¹";prev.setAttribute("aria-label",t("previousImage"));const next=document.createElement("button");next.type="button";next.className="slider-btn next";next.textContent="â€º";next.setAttribute("aria-label",t("nextImage"));const dots=document.createElement("div");dots.className="slider-dots";imgs.forEach(()=>{const dot=document.createElement("span");dot.className="dot";dots.appendChild(dot)});prev.addEventListener("click",()=>{const cur=state.slideIndex[item.id]||0;state.slideIndex[item.id]=cur===0?imgs.length-1:cur-1;updateSlider(slider,item)});next.addEventListener("click",()=>{const cur=state.slideIndex[item.id]||0;state.slideIndex[item.id]=cur===imgs.length-1?0:cur+1;updateSlider(slider,item)});slider.appendChild(track);slider.appendChild(prev);slider.appendChild(next);slider.appendChild(dots);setTimeout(()=>updateSlider(slider,item),0);return slider}
    function renderAttractions(){const filtered=getFilteredAttractions();listEl.innerHTML="";resultCountEl.textContent=t("results",filtered.length);if(filtered.length===0){const empty=document.createElement("div");empty.className="empty";empty.textContent=t("noResults");listEl.appendChild(empty);return}filtered.forEach(item=>{const card=document.createElement("article");card.className="card";const content=document.createElement("div");content.className="content";const cat=document.createElement("span");cat.className="category-label";cat.textContent=item.category;const title=document.createElement("h2");title.textContent=item.title[state.language]||item.title.en;const desc=document.createElement("p");desc.className="description";desc.textContent=item.description[state.language]||item.description.en;const maps=document.createElement("a");maps.className="maps-link";maps.href=item.maps_url;maps.target="_blank";maps.rel="noopener noreferrer";maps.textContent=t("openMaps");content.appendChild(cat);content.appendChild(title);content.appendChild(desc);content.appendChild(maps);card.appendChild(createSlider(item));card.appendChild(content);listEl.appendChild(card)})}

    function render(){renderStaticText();renderCategories();renderAttractions()} langButtons.forEach(b=>b.addEventListener("click",()=>setLanguage(b.dataset.lang)));searchEl.addEventListener("input",e=>{state.search=e.target.value;renderAttractions()});render();
